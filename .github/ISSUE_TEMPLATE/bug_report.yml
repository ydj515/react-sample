name: 버그 리포트
description: 버그를 신고합니다.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 무엇이 잘못되었는지 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 재현 방법
      description: 재현 단계를 순서대로 적어 주세요.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 환경
      description: OS, 브라우저, Node/pnpm 버전 등
    validations:
      required: false
