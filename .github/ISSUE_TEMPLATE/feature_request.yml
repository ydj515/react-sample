name: 기능 제안
description: 새로운 기능이나 개선을 제안합니다.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 어떤 불편함이나 필요에서 출발했는지 설명해 주세요.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 고려한 대안
    validations:
      required: false
