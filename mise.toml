[tools]
node = "24.13.0"

[tasks.install]
description = "Install project dependencies with pnpm."
run = "pnpm install"

[tasks.dev]
description = "Generate TanStack Router routes and start the Vite dev server."
run = "pnpm dev"

[tasks."generate-routes"]
description = "Regenerate the TanStack Router route tree."
run = "pnpm generate-routes"

[tasks."watch-routes"]
description = "Watch TanStack Router route files and regenerate the route tree."
run = "pnpm watch-routes"

[tasks.typecheck]
description = "Run TypeScript project reference checks."
run = "pnpm typecheck"

[tasks.lint]
description = "Run ESLint across the project."
run = "pnpm lint"

[tasks."lint-fix"]
description = "Run ESLint and apply safe automatic fixes."
run = "pnpm lint:fix"

[tasks.format]
description = "Format project files with Prettier."
run = "pnpm format"

[tasks."format-check"]
description = "Check Prettier formatting without writing changes."
run = "pnpm format:check"

[tasks.test]
description = "Run the Vitest test suite once."
run = "pnpm test"

[tasks."test-watch"]
description = "Start Vitest in watch mode."
run = "pnpm test:watch"

[tasks.coverage]
description = "Run Vitest with coverage reporting."
run = "pnpm test:coverage"

[tasks.build]
description = "Generate routes, typecheck, and build the production bundle."
run = "pnpm build"

[tasks.storybook]
description = "Start the Storybook dev server on port 6006."
run = "pnpm storybook"

[tasks."build-storybook"]
description = "Build the static Storybook site."
run = "pnpm build-storybook"

[tasks.validate]
description = "Run the full local quality gate: typecheck, lint, format check, tests, and build."
run = "pnpm validate"
